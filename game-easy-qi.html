<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/game.css" />
    <title>Quick Quiz - Play</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
      <div class="container">
          <div id="loader"></div>
          <div id="game" class="justify-center flex-column hidden">
              
              <div id="hud">
                  <div id="hud-item">
                      <p id="progressText" class="hud-prefix">
                           Question
                      </p>
                      <div id="progressBar">
                            <div id="progressBarFull"></div>
                      </div>
                     <!-- <h1 class="hud-main-text" id="questionCounter">  -->
                  </div>
                  <div id="hud-item">
                    <p class="hud-prefix">
                         Score
                    </p>
                    <h1 class="hud-main-text" id="score">
                         0
                  </h1>
                </div>
              </div>
              <h2 id="question"></h2> <!--Whatis the answer of this question?-->
              
              <div class="choice-container">
                  <p class="choice-prefix">A</p>
                  <p class="choice-text" data-number="1"></p> <!--choice1-->
              </div>
              <div class="choice-container">
                <p class="choice-prefix">B</p>
                <p class="choice-text" data-number="2"></p>
            </div>
            <div class="choice-container">
                <p class="choice-prefix">C</p>
                <p class="choice-text" data-number="3"></p>
            </div>
            <div class="choice-container">
                <p class="choice-prefix">D</p>
                <p class="choice-text" data-number="4"></p>
            </div>
          </div>
      </div>
            <!-- Inside home.html -->
             <button type="button" class="close-game-btn" align="center" onclick="closeGame()">Close Game</button>
            <button type="button" class="logout-btn" onclick="logout()">Logout</button>

            <!-- Ensure supabase client and shared scores helper are loaded before the game script -->
            <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
            <script src="js/supabase-client.js"></script>
            <script src="js/scores.js"></script>

            <script src="js/game-easy-qi.js"></script>

            <script>
                // Delegate to shared saveScore helper with quiz-specific defaults
                async function saveScore(score) {
                    return window.saveScore ? window.saveScore(score, 'QI', 'easy', 10) : null;
                }

                function logout() {
                    sessionStorage.removeItem('username');
                    sessionStorage.removeItem('userId');
                    window.location.href = 'index.html';
                }
            </script>

            <style>
                /* Estilo para o botão de logout */
                .logout-btn {
                    background-color: #08067e;
                    text-align: center;
                    color: white;
                }
                .logout-btn:hover { background-color: #3547e5; }
            </style>

</html>
