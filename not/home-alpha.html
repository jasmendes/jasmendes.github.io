<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/app.css">
    <title>Quiz App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="container">
        <div id="home" class="flex-center flex-column">
            <h1>Quick Quiz</h1>
            <a class="btn" href="./game-literature.html">Play Portugues 11 Ano</a>
            <a class="btn" href="./game-philosophy.html">Play Filosofia 11 Ano</a>
            <a class="btn" href="./highscores.html">High Scores</a>
        </div>
        </div>

</body>

<!-- Inside home.html -->
<button type="button" class="logout-btn" onclick="logout()">Logout</button>

<script src="js/supabase-client.js"></script>
<script src="js/scores.js"></script>
<script>
    // Delegate to shared saveScore helper (home-alpha default)
    async function saveScore(score) {
        return window.saveScore(score, 'General', 'medium', null);
    }

    function logout() {
        // Remove login credentials from session
        sessionStorage.removeItem('username');
        sessionStorage.removeItem('userId');

        // Redirect back to the login page
        window.location.href = "index.html";
    }
</script>

<style>
    /* Estilo para o botão de logout */
button {
    background-color: #08067e; /* Cor de fundo vermelha */
    text-align: center;
    color: white; /* Texto branco */
  
}

/* Estilo quando o botão é clicado (hover) */
.logout-btn:hover {
    background-color: #3547e5; /* Cor de fundo um pouco mais escura quando passar o mouse */
}

/* Estilo para o botão quando for pressionado (active) */
.logout-btn:active {
    background-color: #4a2fd3; /* Cor de fundo ainda mais escura quando pressionado */
    transform: scale(0.98); /* Leve diminuição de tamanho para o efeito de clique */
}

    </style>
</html>
