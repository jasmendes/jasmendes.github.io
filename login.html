<script>
  // Quando o utilizador já está logado, vai direto para o quiz
  document.addEventListener('DOMContentLoaded', () => {
    const user = sessionStorage.getItem("username");
    if (user) {
      window.location.href = "index.html"; // redireciona se já estiver logado
      return;
    }

    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");

    if (!loginForm) return; // nada a fazer se o formulário não existir

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const usernameEl = document.getElementById("username");
      const passwordEl = document.getElementById("password");
      const username = usernameEl ? usernameEl.value.trim() : '';
      const password = passwordEl ? passwordEl.value.trim() : '';

      // Login temporário — podes mudar as credenciais
      if (username === "jose" && password === "1234") {
        sessionStorage.setItem("username", username);
        window.location.href = "index.html"; // vai para o menu principal
      } else if (loginError) {
        loginError.textContent = "Credenciais inválidas!";
        loginError.classList.remove("hidden");
      }
    });
  });
</script>
