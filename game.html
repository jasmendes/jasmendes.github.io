<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/game.css" />
  <title>Quizzo - Play</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="container">
    <!-- Loader -->
    <div id="loader"></div>

    <!-- Game Content -->
    <div id="game" class="justify-center flex-column hidden">
      <div id="hud">
        <div id="hud-item">
          <p id="progressText" class="hud-prefix">Question</p>
          <div id="progressBar">
            <div id="progressBarFull"></div>
          </div>
        </div>
        <div id="hud-item">
          <p class="hud-prefix">Score</p>
          <h1 class="hud-main-text" id="score">0</h1>
        </div>
      </div>

      <h2 id="question"></h2>

      <div class="choice-container">
        <p class="choice-prefix">A</p>
        <p class="choice-text" data-number="1"></p>
      </div>
      <div class="choice-container">
        <p class="choice-prefix">B</p>
        <p class="choice-text" data-number="2"></p>
      </div>
      <div class="choice-container">
        <p class="choice-prefix">C</p>
        <p class="choice-text" data-number="3"></p>
      </div>
      <div class="choice-container">
        <p class="choice-prefix">D</p>
        <p class="choice-text" data-number="4"></p>
      </div>

      <button onclick="logout()">Logout</button>
    </div>
  </div>
  <script>
    // Supabase initialization


    // Save score to Supabase
    async function saveScore(score) {
        const username = sessionStorage.getItem('username');

        if (!username) {
            console.log('Usuário não autenticado.');
            return;
        }

        try {
            const { data, error } = await supabaseClient
                .from('scores')
                .insert([{
                    username,
                    score,
                    date: new Date().toISOString()
                }])
                .select();

            if (error) {
                console.error('Erro ao salvar score:', error);
                return;
            }

            console.log(`Score ${score} salvo para ${username}`);
        } catch (err) {
            console.error('Save score error:', err);
        }
    }

    function logout() {
        // Remove login credentials from session
        sessionStorage.removeItem('username');
        sessionStorage.removeItem('userId');

        // Redirect back to the login page
        window.location.href = "index.html";
    }
  </script>

  <script src="js/game-por.js"></script>
</body>
  <script src="js/supabase-client.js"></script>
  <script src="js/scores.js"></script>
  <script>
    // Delegate to shared saveScore helper with quiz-specific defaults
    async function saveScore(score) {
      return window.saveScore(score, 'General Quiz', 'medium', 10);
    }

    function logout() {
      // Remove login credentials from session
      sessionStorage.removeItem('username');
      sessionStorage.removeItem('userId');

      // Redirect back to the login page
      window.location.href = "index.html";
    }
  </script>

  <style>
</html>
