<!DOCTYPE html>
<html>
<head>
    <title>Ranking</title>
</head>
<body>

<h1>Ranking</h1>

<table border="1">
    <thead>
        <tr>
            <th>Utilizador</th>
            <th>Pontuação</th>
        </tr>
    </thead>

    <tbody id="ranking"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
    "https://rdactxwmqqxognfiltgt.supabase.co",
    "TUA_ANON_KEY"
);
const { data } = await supabase
    .from('scores')
    .select('*')
    .order('score', { ascending:false });

let html = '';

data.forEach(item => {

    html += `
    <tr>
        <td>${item.username}</td>
        <td>${item.score}</td>
        <td>${item.subject}</td>
    </tr>
    `;
});

document
    .getElementById('scores')
    .innerHTML = html;

loadScores();

</script>

</body>
</html>
