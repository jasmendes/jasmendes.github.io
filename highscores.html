<script>
    (async function loadScores(){
        try {
            const { data, error } = await window.supabaseClient
                .from('scores')
                .select('*')
                .order('score', { ascending: false })
                .limit(100);

            if (error) {
                console.error('Error fetching scores', error);
                return;
            }

            let html = '';
            data.forEach(item => {
                html += `
                <tr>
                    <td>${item.username}</td>
                    <td>${item.score}</td>
                    <td>${item.subject || ''}</td>
                </tr>`;
            });

            document.getElementById('ranking').innerHTML = html;
        } catch (err) {
            console.error(err);
        }
    })();
</script>
