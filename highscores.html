<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>High Scores</title>

<style>
:root {
    --bg: #f5f7ff;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --primary: #4f46e5;
    --primary-strong: #4338ca;
    --success: #10b981;
    --border: rgba(79, 70, 229, 0.12);
}

* {
    box-sizing: border-box;
}

body {
    font-family: Inter, Arial, Helvetica, sans-serif;
    max-width: 1100px;
    margin: 30px auto;
    padding: 0 20px 40px;
    background: linear-gradient(180deg, #eef2ff 0%, #f8f9ff 100%);
    color: var(--text);
}

.page-header {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
}

.page-header h1 {
    font-size: clamp(2rem, 2.5vw, 2.5rem);
    margin: 0;
}

.page-header-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.button-primary,
.button-secondary,
.button-ghost {
    border: none;
    border-radius: 999px;
    padding: 12px 22px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.24s ease, box-shadow 0.24s ease, background-color 0.24s ease, color 0.24s ease;
}

.button-primary {
    background: var(--primary);
    color: white;
    box-shadow: 0 12px 35px rgba(79, 70, 229, 0.16);
}

.button-primary:hover {
    transform: translateY(-2px);
    background: var(--primary-strong);
}

.button-secondary {
    background: white;
    color: var(--text);
    border: 1px solid rgba(31, 41, 55, 0.12);
}

.button-secondary:hover {
    transform: translateY(-2px);
    background: #f8fafc;
}

.button-ghost {
    background: transparent;
    color: var(--primary);
    border: 1px solid rgba(79, 70, 229, 0.18);
}

.button-ghost:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(79, 70, 229, 0.08);
}

.controls-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    margin-bottom: 24px;
}

.filter-group {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    align-items: center;
}

.filter-group label {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 0.95rem;
    color: var(--muted);
}

.filter-group select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid rgba(31, 41, 55, 0.12);
    border-radius: 12px;
    font-size: 0.95rem;
    background: #fff;
    color: var(--text);
}

.filter-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
}

thead tr {
    background: #4f46e5;
    color: white;
}

th, td {
    padding: 16px 14px;
    text-align: left;
}

th {
    font-weight: 700;
    letter-spacing: 0.02em;
}

tbody tr {
    border-bottom: 1px solid rgba(15, 23, 42, 0.06);
}

tbody tr:last-child {
    border-bottom: none;
}

tbody tr:nth-child(even) {
    background: #f8f9ff;
}

tbody td {
    color: #334155;
}

tbody td:nth-child(1) {
    width: 58px;
    font-weight: 700;
}

tbody td:nth-child(5) {
    font-weight: 700;
}

.status-pill {
    display: inline-flex;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 700;
    color: white;
    text-transform: capitalize;
}

.status-pill.easy { background: #10b981; }
.status-pill.medium { background: #f59e0b; }
.status-pill.hard { background: #ef4444; }

@media (max-width: 820px) {
    .controls-card {
        grid-template-columns: 1fr;
    }

    .page-header {
        justify-content: center;
        text-align: center;
    }

    .page-header-actions {
        justify-content: center;
    }
}
</style>

</head>
<body>

<div class="page-header">
    <div>
        <h1>🏆 Ranking Global</h1>
        <p style="color: var(--muted); margin: 8px 0 0;">Filtre por disciplina e dificuldade para ver o ranking exato da sua categoria.</p>
    </div>
    <div class="page-header-actions">
        <a href="#" onsubmit="jogarMais()" class="button-secondary">
            🎮 Jogar Mais
        </a>
        <button id="logoutBtn" class="button-ghost">Logout</button>
    </div>
</div>

<div class="controls-card">
    <div class="filter-group">
        <label>
            Disciplina
            <select id="subjectFilter">
                <option value="">Todas</option>
            </select>
        </label>
        <label>
            Dificuldade
            <select id="difficultyFilter">
                <option value="">Todas</option>
                <option value="easy">easy</option>
                <option value="medium">medium</option>
                <option value="hard">hard</option>
            </select>
        </label>
    </div>
    <div class="filter-actions">
        <button id="applyFilter" class="button-primary">Aplicar</button>
        <button id="resetFilter" class="button-secondary">Limpar</button>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Utilizador</th>
            <th>Disciplina</th>
            <th>Dificuldade</th>
            <th>Pontuação</th>
            <th>Data</th>
        </tr>
    </thead>

    <tbody id="ranking">
        <tr>
            <td colspan="6">A carregar...</td>
        </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

<script>

    function jogarMais() {
     document.getElementById('login').classList.add('hidden');
    window.location.href = 'index.html';
}
   
async function loadScores(){
    const ranking = document.getElementById("ranking");
    const subject = document.getElementById('subjectFilter').value;
    const difficulty = document.getElementById('difficultyFilter').value;

    try {
        let query = supabaseClient.from('scores').select('*');

        if (subject) query = query.eq('subject', subject);
        if (difficulty) query = query.eq('difficulty', difficulty);

        const { data, error } = await query.order('score', { ascending: false }).limit(500);


        console.log('Scores:', data);

        if(error){
            console.error(error);

            ranking.innerHTML =
                `<tr>
                    <td colspan="6">
                        Erro ao carregar ranking
                    </td>
                </tr>`;
            return;
        }

        if(!data || data.length === 0){

        // Render top scores with normalized difficulty display
        function normalizeDisplayDifficulty(d) {
            if (!d) return '-';
            const s = String(d).toLowerCase();
            if (s.includes('easy')) return 'easy';
            if (s.includes('hard')) return 'hard';
            return 'medium';
        }

            ranking.innerHTML =
                `<tr>
                    <td colspan="6">
                        Ainda não existem resultados
                    </td>
                </tr>`;

            return;
        }

        ranking.innerHTML =
            data.map((item,index) => `

            <tr>
                <td>${index + 1}</td>
                <td>${item.username}</td>
                <td>${item.subject ?? '-'}</td>
                <td>${item.difficulty ?? '-'}</td>
                <td>${item.score}</td>
                <td>
                    ${new Date(
                        item.created_at
                    ).toLocaleDateString('pt-PT')}
                </td>
            </tr>

            `).join('');

    }
    catch(err){

        console.error(err);

        ranking.innerHTML =
            `<tr>
                <td colspan="6">
                    Erro inesperado
                </td>
            </tr>`;
    }
}

// Populate subject filter with existing subjects (fetch distinct client-side)
async function populateSubjects() {
    try {
        const { data } = await supabaseClient.from('scores').select('subject').limit(1000);
        const subjects = Array.from(new Set((data || []).map(s => s.subject).filter(Boolean))).sort();
        const sel = document.getElementById('subjectFilter');
        subjects.forEach(sub => {
            const opt = document.createElement('option');
            opt.value = sub;
            opt.textContent = sub;
            sel.appendChild(opt);
        });
    } catch (err) {
        console.warn('Could not populate subjects:', err);
    }
}

// Read URL parameters and auto-apply filters
function applyUrlFilters() {
    const params = new URLSearchParams(window.location.search);
    const category = params.get('category') || params.get('subject');
    const difficulty = params.get('difficulty');

    if (category) {
        document.getElementById('subjectFilter').value = category;
    }
    if (difficulty) {
        document.getElementById('difficultyFilter').value = difficulty;
    }
}

document.getElementById('applyFilter').addEventListener('click', loadScores);
document.getElementById('resetFilter').addEventListener('click', () => {
    document.getElementById('subjectFilter').value = '';
    document.getElementById('difficultyFilter').value = '';
    loadScores();
});

document.getElementById('logoutBtn').addEventListener('click', () => {
    try {
        sessionStorage.removeItem('username');
        sessionStorage.removeItem('userId');
        localStorage.removeItem('isLoggedIn');
    } catch (err) {
        console.warn('Logout cleanup failed:', err);
    }
    window.location.href = 'index.html';
});

window.addEventListener('DOMContentLoaded', async () => {

    try {
        await populateSubjects();
    } catch (err) {
        console.error('populateSubjects:', err);
    }

    applyUrlFilters();
    await loadScores();
});
</script>

</body>
</html>
