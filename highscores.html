<!DOCTYPE html>
<html lang="pt">

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 30px auto;

table{
    width:100%;
    border-collapse: collapse;
}

th, td{
    border:1px solid #ccc;

    background:#4f46e5;

<body>

<h1>🏆 Ranking Global</h1>
<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;">
    <label>Disciplina:
        <select id="subjectFilter">
            <option value="">Todas</option>
        </select>
    </label>
    <label>Dificuldade:
        <select id="difficultyFilter">
            <option value="">Todas</option>
                <option value="easy">easy</option>
                <option value="medium">medium</option>
                <option value="hard">hard</option>
        </select>
    </label>
    <button id="applyFilter">Aplicar</button>
    <button id="resetFilter">Limpar</button>
</div>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Utilizador</th>
            <th>Disciplina</th>
            <th>Dificuldade</th>
            <th>Pontuação</th>
            <th>Data</th>
        </tr>
    </thead>

    <tbody id="ranking">
        <tr>
            <td colspan="6">A carregar...</td>
        </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

);

<script>
   
async function loadScores(){
    const ranking = document.getElementById("ranking");
    const subject = document.getElementById('subjectFilter').value;
    const difficulty = document.getElementById('difficultyFilter').value;

    try {
        let query = supabaseClient.from('scores').select('*');

        if (subject) query = query.eq('subject', subject);
        if (difficulty) query = query.eq('difficulty', difficulty);

        const { data, error } = await query.order('score', { ascending: false }).limit(500);

        if(error){
            console.error(error);

            ranking.innerHTML =
                `<tr>
                    <td colspan="6">
                        Erro ao carregar ranking
                    </td>
                </tr>`;
            return;
        }

        if(!data || data.length === 0){

        // Render top scores with normalized difficulty display
        function normalizeDisplayDifficulty(d) {
            if (!d) return '-';
            const s = String(d).toLowerCase();
            if (s.includes('easy')) return 'easy';
            if (s.includes('hard')) return 'hard';
            return 'medium';
        }

            ranking.innerHTML =
                `<tr>
                    <td colspan="6">
                        Ainda não existem resultados
                    </td>
                </tr>`;

            return;
        }

        ranking.innerHTML =
            data.map((item,index) => `

            <tr>
                <td>${index + 1}</td>
                <td>${item.username}</td>
                <td>${item.subject ?? '-'}</td>
                <td>${item.difficulty ?? '-'}</td>
                <td>${item.score}</td>
                <td>
                    ${new Date(
                        item.created_at
                    ).toLocaleDateString('pt-PT')}
                </td>
            </tr>

            `).join('');

    }
    catch(err){

        console.error(err);

        ranking.innerHTML =
            `<tr>
                <td colspan="6">
                    Erro inesperado
                </td>
            </tr>`;
    }
}

// Populate subject filter with existing subjects (fetch distinct client-side)
async function populateSubjects() {
    try {
        const { data } = await supabaseClient.from('scores').select('subject').limit(1000);
        const subjects = Array.from(new Set((data || []).map(s => s.subject).filter(Boolean))).sort();
        const sel = document.getElementById('subjectFilter');
        subjects.forEach(sub => {
            const opt = document.createElement('option');
            opt.value = sub;
            opt.textContent = sub;
            sel.appendChild(opt);
        });
    } catch (err) {
        console.warn('Could not populate subjects:', err);
    }
}

document.getElementById('applyFilter').addEventListener('click', loadScores);
document.getElementById('resetFilter').addEventListener('click', () => {
    document.getElementById('subjectFilter').value = '';
    document.getElementById('difficultyFilter').value = '';
    loadScores();
});

populateSubjects().then(loadScores);

</script>

</body>
</html>
