<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>High Scores</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 30px auto;
}

table{
    width:100%;
    border-collapse: collapse;
}

th, td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#4f46e5;
    color:white;
}

tr:nth-child(even){
    background:#f5f5f5;
}
</style>

</head>
<body>

<h1>🏆 Ranking Global</h1>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Utilizador</th>
            <th>Disciplina</th>
            <th>Dificuldade</th>
            <th>Pontuação</th>
            <th>Data</th>
        </tr>
    </thead>

    <tbody id="ranking">
        <tr>
            <td colspan="6">A carregar...</td>
        </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
    "https://rdactxwmqqxognfiltgt.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkYWN0eHdtcXF4b2duZmlsdGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODY5MzcsImV4cCI6MjA5Njc2MjkzN30.gpukeBC44WRNmzBVhTg1_nB756DbWRzpX88rDdzO-Eo"
);
</script>
<script>
   
async function loadScores(){

    const ranking =
        document.getElementById("ranking");

    try {

        const { data, error } =
            await supabaseClient
                .from("scores")
                .select("*")
                .order("score", {
                    ascending:false
                })
                .limit(100);

        if(error){
            console.error(error);

            ranking.innerHTML =
                `<tr>
                    <td colspan="6">
                        Erro ao carregar ranking
                    </td>
                </tr>`;
            return;
        }

        if(!data || data.length === 0){

            ranking.innerHTML =
                `<tr>
                    <td colspan="6">
                        Ainda não existem resultados
                    </td>
                </tr>`;

            return;
        }

        ranking.innerHTML =
            data.map((item,index) => `

            <tr>
                <td>${index + 1}</td>
                <td>${item.username}</td>
                <td>${item.subject ?? '-'}</td>
                <td>${item.difficulty ?? '-'}</td>
                <td>${item.score}</td>
                <td>
                    ${new Date(
                        item.created_at
                    ).toLocaleDateString('pt-PT')}
                </td>
            </tr>

            `).join('');

    }
    catch(err){

        console.error(err);

        ranking.innerHTML =
            `<tr>
                <td colspan="6">
                    Erro inesperado
                </td>
            </tr>`;
    }
}

loadScores();

</script>

</body>
</html>
