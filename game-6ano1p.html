<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/game.css" />
    <title>Quick Quiz - Play</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
      <div class="container">
          <div id="loader"></div>
          <div id="game" class="justify-center flex-column hidden">
              <div id="hud">
                    <script src="js/supabase-client.js"></script>
                    <script src="js/scores.js"></script>
                    <script>
                        // Delegate to shared saveScore helper with quiz-specific defaults
                        async function saveScore(score) {
                            return window.saveScore(score, 'Matematica 6 ano', 'easy', 10);
                        }

                        function logout() {
                            // Remove login credentials from session
                            sessionStorage.removeItem('username');
                            sessionStorage.removeItem('userId');

                            // Redirect back to the login page
                            window.location.href = "index.html";
                        }
                    </script>

                    <style>
    async function saveScore(score) {
        const username = sessionStorage.getItem('username');

        if (!username) {
            console.log('Usuário não autenticado.');
            return;
        }

        try {
            const { data, error } = await supabaseClient
                .from('scores')
                .insert([{
                username,
                score,
                subject: 'Matemativa 6 ano',
                difficulty: 'easy',
                total_questions: 10
            }])
                .select();

            if (error) {
                console.error('Erro ao salvar score:', error);
                return;
            }

            console.log(`Score ${score} salvo para ${username}`);
        } catch (err) {
            console.error('Save score error:', err);
        }
    }

    function logout() {
        // Remove login credentials from session
        sessionStorage.removeItem('username');
        sessionStorage.removeItem('userId');

        // Redirect back to the login page
        window.location.href = "index.html";
    }
</script>

<style>
    /* Estilo para o botão de logout */
button {
    background-color: #08067e; /* Cor de fundo vermelha */
    text-align: center;
    color: white; /* Texto branco */

}

/* Estilo quando o botão é clicado (hover) */
button:hover {
    background-color: #3547e5; /* Cor de fundo um pouco mais escura quando passar o mouse */
}

/* Estilo para o botão quando for pressionado (active) */
button:active {
    background-color: #4a2fd3; /* Cor de fundo ainda mais escura quando pressionado */
    transform: scale(0.98); /* Leve diminuição de tamanho para o efeito de clique */
}

    </style>
</html>
