<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/game.css" />
    <title>Quick Quiz - Play</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
      <div class="container">
          <div id="loader"></div>
          <div id="game" class="justify-center flex-column hidden">
              <button type="button" class="close-game-btn" onclick="closeGame()">Close Game</button>
              <div id="hud">
                  <div id="hud-item">
                      <p id="progressText" class="hud-prefix">
                           Question
                      </p>
                      <div id="progressBar">
                            <div id="progressBarFull"></div>
                      </div>
                     <!-- <h1 class="hud-main-text" id="questionCounter">  -->
                  </div>
                  <div id="hud-item">
                    <p class="hud-prefix">
                         Score
                    </p>
                      <!-- Inside home.html -->
                      <button type="button" class="logout-btn" onclick="logout()">Logout</button>

                      <!-- Load Supabase client and shared helpers before the game script -->
                      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                      <script src="js/supabase-client.js"></script>
                      <script src="js/scores.js"></script>

                      <script src="js/game-por.js"></script>

                      <script>
                        // Delegate to shared saveScore helper with quiz-specific defaults
                        async function saveScore(score) {
                          return window.saveScore ? window.saveScore(score, 'Portuguese Literature', 'medium', 10) : null;
                        }

                        function logout() {
                          sessionStorage.removeItem('username');
                          sessionStorage.removeItem('userId');
                          window.location.href = 'index.html';
                        }
                      </script>

                      <style>
                        /* Estilo para o botão de logout */
                        .logout-btn { background-color: #08067e; text-align: center; color: white; }
                        .logout-btn:hover { background-color: #3547e5; }
                      </style>

                </html>
</script>

<style>
    /* Estilo para o botão de logout */
button {
    background-color: #08067e; /* Cor de fundo vermelha */
    text-align: center;
    color: white; /* Texto branco */

}

/* Estilo quando o botão é clicado (hover) */
.logout-btn:hover {
    background-color: #3547e5; /* Cor de fundo um pouco mais escura quando passar o mouse */
}

/* Estilo para o botão quando for pressionado (active) */
.logout-btn:active {
    background-color: #4a2fd3; /* Cor de fundo ainda mais escura quando pressionado */
    transform: scale(0.98); /* Leve diminuição de tamanho para o efeito de clique */
}

    </style>
</html>
